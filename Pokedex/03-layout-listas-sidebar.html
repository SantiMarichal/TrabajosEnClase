<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3 - Layout sidebar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="navbar-left">
            <img src="https://placehold.co/32x32" alt="Logo">
            <h1>Pokédex</h1>
        </div>
    </header>
    <div class="container">
        <aside class="sidebar">
            <ul class="menu">
                <li class="menu-item">
                     Dashboard
                </li>
                <li class="menu-item">
                     Pokémon
                </li>
                <li class="menu-item">
                     Historial
                </li>
            </ul>
        </aside>
        <main class="main-container">
            <h2>Bienvenido</h2>
            <section class="cards-container">
                <div class="card">
                    <h1>Swampert</h1>
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/260.png" alt="Imagen Swampert" class="card-img">
                        <figcaption class="card-text">Tipo: Agua/Tierra</figcaption>
                        <figcaption class="card-legend">Leyenda: <br> Swampert (ラグラージ Laglarge en japonés) es un Pokémon de tipo agua/tierra introducido en la tercera generación. Es la evolución de Marshtomp.</figcaption>
                    </figure>
                    <a href="https://www.wikidex.net/wiki/Swampert" target="_self">Ver mas</a>
                </div>
                <div class="card">
                    <h1>Charizard</h1>
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" alt="Imagen Charizard" class="card-img">
                        <figcaption class="card-text">Tipo: Fuego/Volador</figcaption>
                        <figcaption class="card-legend">Leyenda: <br>Charizard (リザードン Lizardon en japonés) es un Pokémon de tipo fuego/volador introducido en la primera generación. Es la evolución de Charmeleon.
                            </figcaption>
                    </figure>
                    <a href="https://www.wikidex.net/wiki/Charizard" target="_self">Ver mas</a>
                </div>
                <div class="card">
                    <h1>Amoonguss</h1>
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/591.png" alt="Imagen Amoonguss" class="card-img">
                        <figcaption class="card-text">Tipo: Planta/Veneno</figcaption>
                        <figcaption class="card-legend">Leyenda: <br>Amoonguss (モロバレル Morobareru en japonés) es un Pokémon de tipo planta/veneno introducido en la quinta generación. Es la evolución de Foongus.</figcaption>
                    </figure>
                    <a href="https://www.wikidex.net/wiki/Amoonguss" target="_self">Ver mas</a>
                </div>
                <div class="card">
                    <h1>Darkrai</h1>
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/491.png" alt="Imagen Darkrai" class="card-img">
                        <figcaption class="card-text">Tipo: Siniestro</figcaption>
                        <figcaption class="card-legend">Leyenda: <br>Darkrai (ダークライ Darkrai en japonés) es un Pokémon singular de tipo siniestro introducido en la cuarta generación. lorem ipsum dolor sit amet</figcaption>
                    </figure>
                    <a href="https://www.wikidex.net/wiki/Darkrai" target="_self">Ver mas</a>
                </div>
                <div class="card">
                    <h1>Greninja</h1>
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/658.png" alt="Imagen Greninja" class="card-img">
                        <figcaption class="card-text">Tipo: Agua/Siniestro</figcaption>
                        <figcaption class="card-legend">Leyenda: <br>Greninja (ゲッコウガ Gekkouga en japonés) es un Pokémon de tipo agua/siniestro introducido en la sexta generación. Es la evolución de Frogadier.</figcaption>
                    </figure>
                    <a href="https://www.wikidex.net/wiki/Greninja" target="_self">Ver mas</a>
                </div>
                <div class="card">
                    <h1>Metagross</h1>
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/376.png" alt="Imagen Metagross" class="card-img">
                        <figcaption class="card-text">Tipo: Acero/Psiquico</figcaption>
                        <figcaption class="card-legend">Leyenda: <br>Metagross (メタグロス Metagross en japonés) es un Pokémon de tipo acero/psíquico introducido en la tercera generación. Es la evolución de Metang.</figcaption>
                    </figure>
                    <a href="https://www.wikidex.net/wiki/Metagross" target="_self">Ver mas</a>
                </div>
            </section>
        </main>
    </div>
    <footer class="footer">
        <p>3 - Layout sidebar</p>
    </footer>
</body>
</html>
