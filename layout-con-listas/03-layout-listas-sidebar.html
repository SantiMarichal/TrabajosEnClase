<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3 - Layout sidebar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="navbar-left">
            <img src="https://placehold.co/32x32" alt="Logo">
            <h1>Pokédex</h1>
        </div>
    </header>
    <div class="container">
        <aside class="sidebar">
            <ul class="menu">
                <li class="menu-item">
                     Dashboard
                </li>
                <li class="menu-item">
                     Pokémon
                </li>
                <li class="menu-item">
                     Historial
                </li>
            </ul>
        </aside>
        <main class="main-container">
            <h2>Lorem ipsum dolor sit amet.</h2>
            <section class="cards-container">
                <div class="card">
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/152.png" alt="Imagen Chikorita" class="card-img">
                        <figcaption>Tipo: Planta</figcaption>
                    </figure>
                    <a href="https://pokemon.fandom.com/wiki/Chikorita" target="_blank">Ver más</a>
                </div>
                <div class="card">
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/65.png" alt="Imagen Alakasam" class="card-img">
                        <figcaption>Tipo: Psíquico</figcaption>
                    </figure>
                    <a href="https://pokemon.fandom.com/wiki/Alakazam" target="_blank">Ver más</a>
                </div>
                <div class="card">
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png" alt="Imagen Gengar" class="card-img">
                        <figcaption>Tipo: Fantasma</figcaption>
                    </figure>
                    <a href="https://pokemon.fandom.com/wiki/Gengar" target="_blank">Ver más</a>
                </div>

                <div class="card">
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/143.png" alt="Imagen Snorlax" class="card-img">
                        <figcaption>Tipo: Normal</figcaption>
                    </figure>
                    <a href="https://pokemon.fandom.com/wiki/Snorlax" target="_blank">Ver más</a>
                </div>
                <div class="card">
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/135.png" alt="Imagen Jolteon" class="card-img">
                        <figcaption>Tipo: Eléctrico</figcaption>
                    </figure>
                    <a href="https://pokemon.fandom.com/wiki/Jolteon" target="_blank">Ver más</a>
                </div>
                <div class="card">
                    <figure>
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/131.png" alt="Imagen Lapras" class="card-img">
                        <figcaption>Tipo: Hielo</figcaption>
                    </figure>
                    <a href="https://pokemon.fandom.com/wiki/Lapras" target="_blank">Ver más</a>
                </div>
            </section>
        </main>
    </div>
    <footer class="footer">
        <p>3 - Layout sidebar</p>
    </footer>
</body>
</html>
