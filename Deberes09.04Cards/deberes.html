<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends</title>
    <style>
        *{
            box-sizing: border-box;
            margin:0;
            padding:0;
        }
        .header{
            display: flex;
            flex-wrap:wrap;
            width: 700px;
        }
        .imagen{
            width: 100px;
            border-radius: 50%;
        }
        .h1Head{
            margin-top: 30px;
        }
        .usuario{
            display: flex;
            flex-direction: row-reverse;
        }
        .h1{
            text-align: center;
        }
        .main-container{
            
        }
        .card{
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgb(255, 255, 255);
            border-radius:10px;
            padding: 20px;
            width: 250px;
            text-align: center;
            box-shadow: 0px 0px 20px rgb(61, 63, 61); 
            margin:20px;
        }
        .card-img{
            height: 400px;
            width: 225px;
        }   
        .card a{
            color: black;
            text-decoration: none;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            background-color: var(--color-primary);
            box-shadow: 5px 10px 15px rgb(56, 56, 56);
        }
    </style>
</head>
<body>
    <header>
        <div class="header">
            <img src="lol.jpg" class="imagen">
            <h1 class="h1Head">League of Legends</h1>
        </div>
        <div class="usuario">
            <h2>SantiCrack88M</h2>
        </div>
    </header>
    <hr>
    <main class="main-container">
        <h1 class="h1">PERSONAJES</h1>
        <div class="morgana">
            <div class="card">
            <h1>Morgana</h1>
            <figure>
                <img src="Morgana.jpg" alt="Imagen Morgana" class="card-img">
                <figcaption class="card-text">Linea: Support</figcaption>
            </figure>
            <a href="https://wiki.leagueoflegends.com/en-us/Morgana" target="_self">Ver mas</a>
        </div>
        <div class="table">
            <table>
                <thead>
                 <tr>
                    <th>Nacion</th>
                    <th>Roles</th>
                    <th>Historia</th>
                </tr>
                </thead>
            </table>
        </div>
        </div>
        <div class="card">
            <h1>Seraphine</h1>
            <figure>
                <img src="seraphine.jpg" alt="Imagen Seraphine" class="card-img">
                <figcaption class="card-text">Linea: Support</figcaption>
            </figure>
            <a href="https://wiki.leagueoflegends.com/en-us/Seraphine" target="_self">Ver mas</a>
        </div>
        <div class="card">
            <h1>Blitzcrank</h1>
            <figure>
                <img src="blitzcrank.jpg" alt="Imagen Blitzcrank" class="card-img">
                <figcaption class="card-text">Linea: Support</figcaption>
            </figure>
            <a href="https://wiki.leagueoflegends.com/en-us/Blitzcrank" target="_self">Ver mas</a>
        </div>
        
    </main>
</body>
</html>
