<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            background-color: coral;
            height: 900px;
            width: 800px;
            display: grid;
            /*grid-template-columns: 200px 200px 200px;*/
            /*La funcion repeat se utiliza para indicarle el tamaño que se repite*/
            grid-template-columns: repeat(2, 200px) 100px;
            /*grid-template-columns: 1fr 2fr 1fr;*/
            justify-content: center; /*Alineacion horizontal de ...*/
            align-content: center; /*Alineacion vertical de ...*/
            
            grid-template-rows: 350px 350px;
            
            justify-items: center; /*Alineacion horizontal de ...*/
            justify-content: center; /*Alineacion horizontal de ...*/
        }

        .item{
            background-color: #15857A;
            border:5px solid;
            height:200px;
            width: 100px;
        }
    </style>
</head>
<body>
    <section class="parent">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
    </section>
</body>
</html>
